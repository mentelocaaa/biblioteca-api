<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca API - Gestión de Libros</title>
    <link rel="stylesheet" href="css/estilo.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 Biblioteca Personal</h1>
            <p>API RESTful con Node.js + Express + MySQL</p>
        </header>

        <!-- Sección de autenticación -->
        <div class="auth-section" id="authSection">
            <div class="card" id="loginCard">
                <h2>🔐 Iniciar Sesión</h2>
                <form id="loginForm">
                    <div class="form-group">
                        <label for="usuario">Usuario:</label>
                        <input type=" " id="usuario" placeholder="admin" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Contraseña:</label>
                        <input type="password" id="password" placeholder="(cualquier valor)" required>
                    </div>
                    <button type="submit" class="btn-primary">Iniciar Sesión</button>
                </form>
                <p class="info- ">📝 Usuario: <strong>admin</strong> (cualquier contraseña)</p>
            </div>
            <div id="userInfo" style="display: none;">
                <div class="card user-card">
                    <p>✅ Conectado como: <strong id="nombreUsuario"></strong></p>
                    <button id="logoutBtn" class="btn-danger">Cerrar Sesión</button>
                </div>
            </div>
        </div>

        <!-- Sección de gestión de libros (requiere login) -->
        <div id="gestionLibros" style="display: none;">
            
            <!-- Formulario para crear libro -->
            <div class="card">
                <h2>➕ Agregar Nuevo Libro</h2>
                <form id="libroForm">
                    <div class="form-group">
                        <label for="titulo">Título *:</label>
                        <input type=" " id="titulo" required>
                        <small class="error-msg" id="error-titulo"></small>
                    </div>
                    <div class="form-group">
                        <label for="autor">Autor *:</label>
                        <input type=" " id="autor" required>
                        <small class="error-msg" id="error-autor"></small>
                    </div>
                    <div class="form-group">
                        <label for="anio">Año de publicación *:</label>
                        <input type="number" id="anio" placeholder="ej: 2020" required>
                        <small class="error-msg" id="error-anio"></small>
                    </div>
                    <div class="form-group">
                        <label for="genero">Género *:</label>
                        <input type=" " id="genero" required>
                        <small class="error-msg" id="error-genero"></small>
                    </div>
                    <div class="form-group">
                        <label>
                            <input type="checkbox" id="disponible" checked>
                            Disponible para préstamo
                        </label>
                    </div>
                    <button type="submit" class="btn-primary">➕ Agregar Libro</button>
                </form>
            </div>

            <!-- Botón para recargar lista -->
            <div class="toolbar">
                <button id="recargarBtn" class="btn-secondary">🔄 Recargar Lista</button>
                <input type=" " id="searchInput" placeholder="🔍 Buscar por título o autor..." class="search-input">
            </div>

            <!-- Lista de libros -->
            <div class="card">
                <h2>📖 Catálogo de Libros</h2>
                <div id="listaLibros">
                    <p>Cargando libros...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
